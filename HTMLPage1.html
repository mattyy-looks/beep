<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beep Sound</title>
</head>
<body>
    <button onclick="playBeep()">Play Beep</button>

    <script>
        function playBeep() {
            // Create an AudioContext
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Create an oscillator node
            const oscillator = audioCtx.createOscillator();

            // Set the oscillator frequency and type
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // 440 Hz is the frequency for A4 note
            oscillator.type = 'sine'; // You can change this to 'square', 'sawtooth', or 'triangle'

            // Create a gain node to control the volume
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime); // Set the volume to 50%

            // Connect the oscillator to the gain node and the gain node to the destination (speakers)
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // Start the oscillator
            oscillator.start();

            // Stop the oscillator after 1 second (1000 milliseconds)
            oscillator.stop(audioCtx.currentTime + 1);
        }
    </script>
</body>
</html>
